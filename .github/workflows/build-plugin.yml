name: Build Unraid Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build Raidman
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go mod download
          go build -v -o raidman src/cmd/app/main.go

      - name: Extract Release Notes
        run: |
          # Extract the line matching the version tag, remove XML tags and whitespace
          # Strip leading 'v' from tag if present (e.g. v2026.02.10 -> 2026.02.10)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          grep "<CHANGE>${VERSION}" raidman.plg | sed -e 's/<CHANGE>//' -e 's/<\/CHANGE>//' -e 's/^[ \t]*//' > release_notes.txt || true
          # If empty, default to the tag name
          if [ ! -s release_notes.txt ]; then echo "${{ github.ref_name }}" > release_notes.txt; fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: raidman
          body_path: release_notes.txt
